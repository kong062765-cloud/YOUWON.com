<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YOUWON</title>

<!-- 링크 ON / OFF -->
<script>
const OPEN = false;
const TARGET = "https://kong062765-cloud.github.io/YOUWON.com/";

if (OPEN) {
    location.href = TARGET;
}
</script>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Pretendard',sans-serif;
    background:url('https://i.imgur.com/UEps7xH.jpg') center center / cover fixed;
    color:#fff;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.35);
    z-index:0;
}

.container{
    max-width:720px;
    margin:auto;
    padding:120px 30px;
    position:relative;
    z-index:1;
}

.novel{
    font-size:17px;
    line-height:2.1;
    text-align:justify;
    word-break:keep-all;
    white-space:pre-wrap;
}

.novel p{
    text-indent:1.6em;
    margin-bottom:1.2em;
}

.novel p:first-child{
    text-indent:0;
}
</style>
</head>

<body>

<!-- 배경음악 -->
<audio
id="bgm"
src="https://www.image2url.com/r2/default/audio/1776236142738-5549cf45-0c3c-4ccf-a763-862634e2b2f3.mp3"
loop
preload="auto">
</audio>

<div class="container">
<div class="novel">

<p>잘못했어.</p>

<p>매서운 바람 소리에 물기가 젖은 목소리가 섞여들어갔다. 네게 닿았을까. 나는 겨우 맞잡은 손을 붙들며 눈 앞에서 사라져가는 너의 모습을 담으려고 노력했다.</p>

<p>세상에서 가장 적연寂然한 장례였다.</p>

</div>
</div>

<script>
const bgm = document.getElementById("bgm");

/* 음악 재생 함수 */
function startBGM(){
    bgm.volume = 0.05;
    bgm.play().then(()=>{
        console.log("음악 재생 시작");
    }).catch((e)=>{
        console.log("재생 실패:", e);
    });
}

/* 마우스 움직이면 즉시 재생 */
window.addEventListener("mousemove", startBGM, { once:true });

/* 클릭해도 재생 */
window.addEventListener("click", startBGM, { once:true });

/* 스크롤해도 재생 */
window.addEventListener("wheel", startBGM, { once:true });

/* 모바일 */
window.addEventListener("touchstart", startBGM, { once:true });
</script>

</body>
</html>
