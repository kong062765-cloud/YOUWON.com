<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YOUWON</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Pretendard',sans-serif;
    background:url('https://i.imgur.com/UEps7xH.jpg') center/cover fixed;
    color:#fff;
}

/* 배경 오버레이 */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:var(--overlay, rgba(0,0,0,0.3));
    z-index:0;
    transition:background 0.2s linear;
}

.container{
    max-width:720px;
    margin:auto;
    padding:120px 30px;
    position:relative;
    z-index:1;
}

.novel{
    font-size:17px;
    line-height:2.1;
    text-align:justify;
    word-break:keep-all;
    white-space:pre-wrap;
}

.novel p{
    text-indent:1.6em;
    margin-bottom:1.2em;
}

.novel p:first-child{
    text-indent:0;
}
</style>
</head>

<body>

<audio
id="bgm"
src="https://www.image2url.com/r2/default/audio/1776236142738-5549cf45-0c3c-4ccf-a763-862634e2b2f3.mp3"
autoplay
loop
playsinline
preload="auto">
</audio>

<div class="container">
<div class="novel">

<p>잘못했어.</p>

<p>매서운 바람 소리에 물기가 젖은 목소리가 섞여들어갔다. 네게 닿았을까. 나는 겨우 맞잡은 손을 붙들며 눈 앞에서 사라져가는 너의 모습을 담으려고 노력했다.</p>

<p>제발, 제발.... 제발, 윤예성.</p>

<p>그럼에도 사그라든다. 잡고 있던 손끝만이 남았을 때 그가 무언가 말했다.</p>

<p>세상에서 가장 적연寂然한 장례였다.</p>

</div>
</div>

<script>
const bgm = document.getElementById("bgm");
bgm.volume = 0.25;

/* 자동재생 */
function playMusic(){
    const promise = bgm.play();

    if(promise !== undefined){
        promise.catch(()=>{
            setTimeout(()=>bgm.play(),300);
            setTimeout(()=>bgm.play(),1000);
        });
    }
}

window.addEventListener("DOMContentLoaded", playMusic);

document.addEventListener("visibilitychange", ()=>{
    if(!document.hidden){
        playMusic();
    }
});
</script>

</body>
</html>
