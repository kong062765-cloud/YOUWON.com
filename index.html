<script>
const bgm = document.getElementById("bgm");

/* 접속 시 자동 시도 */
window.addEventListener("load", async () => {
    bgm.volume = 0;

    try{
        await bgm.play();

        setTimeout(() => {
            fadeInMusic();
        }, 300);

    }catch(e){}
});

/* 부드럽게 볼륨 올라감 */
function fadeInMusic(){
    let vol = 0;
    const target = 0.25;

    const fade = setInterval(() => {
        vol += 0.02;

        if(vol >= target){
            vol = target;
            clearInterval(fade);
        }

        bgm.volume = vol;
    }, 120);
}

/* 마우스만 움직여도 즉시 재생 */
function unlockMusic(){
    bgm.play().catch(()=>{});
    fadeInMusic();
}
/* 🌫️ 스크롤 배경 변화 */
window.addEventListener("scroll", ()=>{
    const scrollY = window.scrollY;
    const max = document.body.scrollHeight - window.innerHeight;
    const ratio = scrollY / max;
    const opacity = 0.3 + (ratio * 0.45);

    document.styleSheets[1].addRule(
        "body::before",
        "background: rgba(0,0,0,"+opacity+")"
    );
});

document.addEventListener("mousemove", unlockMusic, { once:true });
document.addEventListener("scroll", unlockMusic, { once:true });
document.addEventListener("touchstart", unlockMusic, { once:true });
</script>
