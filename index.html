<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>소설 페이지</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Pretendard',sans-serif;
    background:url('https://i.imgur.com/UEps7xH.jpg') center/cover fixed;
    color:#fff;
}

/* 🌫️ 배경 오버레이 */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.3);
    z-index:0;
    transition:background 0.2s linear;
}

.container{
    max-width:720px;
    margin:auto;
    padding:120px 30px;
    position:relative;
    z-index:1;
}

.novel{
    font-size:17px;
    line-height:2.1;
    text-align:justify;
    word-break:keep-all;
    white-space:pre-wrap;
}

.novel p{
    text-indent:1.6em;
    margin-bottom:1.2em;
}

.novel p:first-child{
    text-indent:0;
}
</style>
</head>

<body>

<!-- 🎧 자동재생 가능하게 muted 추가 -->
<audio id="bgm"
src="https://www.image2url.com/r2/default/audio/1776236142738-5549cf45-0c3c-4ccf-a763-862634e2b2f3.mp3"
autoplay
loop
muted
playsinline>
</audio>

<div class="container">
<div class="novel">
<p>잘못했어.</p>
<p>내용 그대로...</p>
</div>
</div>

<script>
const bgm = document.getElementById("bgm");

/* 🔥 페이지 열리자마자 자동재생 */
window.addEventListener("load", async () => {
    try{
        await bgm.play();

        /* 잠시 후 음소거 해제 + 볼륨 설정 */
        setTimeout(()=>{
            bgm.muted = false;
            bgm.volume = 0.25;
        },500);

    }catch(e){
        console.log("자동재생 제한됨");
    }
});

/* 🌫️ 스크롤 배경 변화 */
window.addEventListener("scroll", ()=>{
    const scrollY = window.scrollY;
    const max = document.body.scrollHeight - window.innerHeight;
    const ratio = scrollY / max;

    const opacity = 0.3 + (ratio * 0.45);

    document.querySelector("body").style.setProperty(
        "--overlay",
        opacity
    );

    document.styleSheets[0].addRule(
        "body::before",
        "background: rgba(0,0,0,"+opacity+")"
    );
});
</script>

</body>
</html>
